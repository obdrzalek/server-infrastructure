events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name test.eduis.cz; # Sem doplň reálnou doménu!

        # Místo, kam si Certbot odloží ověřovací soubor
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # Vše ostatní zatím směřuj na frontend
        location / {
            return 301 https://$host$request_uri;
        }
    }

# 2. Samotné HTTPS rozhraní
    server {
        listen 443 ssl;
        server_name test.eduis.cz;

        # Cesty k vygenerovaným certifikátům (uvnitř Dockeru)
        ssl_certificate /etc/letsencrypt/live/test.eduis.cz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/test.eduis.cz/privkey.pem;

        # Základní optimalizace SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Backend API
        location /api {
            proxy_pass http://eduis-test-backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend Vue 3
        location / {
            proxy_pass http://eduis-test-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            error_page 404 = @frontend_spa;
        }

        # Vue router history mode: neexistujici cesta na frontendu spadne na index.html.
        location @frontend_spa {
            proxy_pass http://eduis-test-frontend:80/index.html;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }    
}
