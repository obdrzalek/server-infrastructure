name: create-certificates
services:
  nginx:
    image: nginx:stable-alpine
    container_name: create-certificate-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./domains.conf:/etc/nginx/domains.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
      - webroot:/var/www/html
    networks:
      - server

  certbot:
    image: certbot/certbot
    container_name: create-certificate-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/html
    networks:
      - server

volumes:
  certbot-etc:
    name: certbot-etc
  certbot-var:
    name: certbot-var
  webroot:
    name: webroot

networks:
  server:
    name: server
