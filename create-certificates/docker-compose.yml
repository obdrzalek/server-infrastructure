name: create-certificates
services:
  nginx:
    image: nginx:stable-alpine
    container_name: create-certificate-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./domains.conf:/etc/nginx/domains.conf:ro
      - ${HOME}/certbot/etc:/etc/letsencrypt:ro
      - ${HOME}/certbot/var:/var/lib/letsencrypt:ro
      - ${HOME}/certbot/webroot:/var/www/html

  certbot:
    image: certbot/certbot
    container_name: create-certificate-certbot
    volumes:
      - ${HOME}/certbot/etc:/etc/letsencrypt
      - ${HOME}/certbot/var:/var/lib/letsencrypt
      - ${HOME}/certbot/webroot:/var/www/html
